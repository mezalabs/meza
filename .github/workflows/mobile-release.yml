name: Mobile Release

on:
  push:
    tags: ['mobile-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. mobile-v0.1.0). Defaults to latest mobile-v* tag.'
        required: false

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          package_json_file: client/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Check tag matches package.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#mobile-v}"
          PKG_VERSION=$(node -p "require('./client/packages/mobile/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Type check
        working-directory: client
        run: pnpm check

  build-android:
    name: Build Android
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          package_json_file: client/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.4

      - name: Install dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        working-directory: client
        run: pnpm --filter @meza/web build
        env:
          VITE_API_URL: ${{ secrets.MOBILE_API_URL }}

      - name: Decode keystore
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/meza-release.keystore"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Decode google-services.json
        if: env.GOOGLE_SERVICES_JSON != ''
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > client/packages/mobile/android/app/google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Patch versionCode from run number
        run: sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" client/packages/mobile/android/app/build.gradle

      - name: Sync Capacitor
        working-directory: client/packages/mobile
        run: npx cap sync android

      - name: Build APK and AAB
        working-directory: client/packages/mobile/android
        run: ./gradlew assembleRelease bundleRelease
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/meza-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            client/packages/mobile/android/app/build/outputs/apk/release/*.apk
            client/packages/mobile/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Cleanup keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/meza-release.keystore"

  build-ios:
    name: Build iOS
    needs: validate
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          package_json_file: client/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        working-directory: client
        run: pnpm --filter @meza/web build
        env:
          VITE_API_URL: ${{ secrets.MOBILE_API_URL }}

      - name: Decode GoogleService-Info.plist
        if: env.GOOGLE_SERVICE_INFO_PLIST != ''
        run: echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 -d > client/packages/mobile/ios/App/App/GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}

      - name: Sync Capacitor
        working-directory: client/packages/mobile
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: client/packages/mobile/ios/App
        run: pod install

      - name: Setup iOS signing
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > "$RUNNER_TEMP/meza.mobileprovision"
          # Extract UUID and install with correct filename
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            "$(security cms -D -i "$RUNNER_TEMP/meza.mobileprovision")")
          cp "$RUNNER_TEMP/meza.mobileprovision" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          echo "Installed profile: $PROFILE_UUID"

      - name: Patch build number from run number
        run: |
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = ${{ github.run_number }}/" \
            client/packages/mobile/ios/App/App.xcodeproj/project.pbxproj

      - name: Extract provisioning profile name
        id: profile
        run: |
          NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< \
            "$(security cms -D -i "$RUNNER_TEMP/meza.mobileprovision")")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Profile: $NAME"

      - name: Archive
        working-directory: client/packages/mobile/ios/App
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=KD587V52FJ \
            'PROVISIONING_PROFILE_SPECIFIER=${{ steps.profile.outputs.name }}'

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist client/packages/mobile/ios/App/ExportOptions.plist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      - name: Cleanup signing materials
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/certificate.p12"
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/meza.mobileprovision

  release:
    name: Create Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#mobile-v}"

          mkdir -p release-files
          find artifacts -type f \( \
            -name "*.apk" -o -name "*.aab" -o -name "*.ipa" \
          \) -exec cp {} release-files/ \;

          echo "Creating draft release for $TAG"
          ls -lh release-files/

          gh release create "$TAG" release-files/* \
            --title "Mobile v${VERSION}" \
            --draft \
            --generate-notes

  upload-play-store:
    name: Upload to Play Store
    needs: build-android
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: artifacts

      - name: Upload AAB to Play Store
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb # v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: chat.meza.app
          releaseFiles: artifacts/**/*.aab
          track: internal

  upload-testflight:
    name: Upload to TestFlight
    needs: build-ios
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: artifacts

      - name: Upload IPA to TestFlight
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          KEY_DIR=~/private_keys
          mkdir -p "$KEY_DIR"
          echo "$APPLE_API_KEY" > "$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"

          IPA=$(find artifacts -name "*.ipa" | head -1)
          echo "Uploading $(basename "$IPA") to TestFlight..."

          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER"

          rm -rf "$KEY_DIR"

      - name: Cleanup API key
        if: always()
        run: rm -rf ~/private_keys
