name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions:
  contents: read

jobs:
  server-test:
    name: Server Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test -race -count=1 -timeout=5m ./...

  server-build:
    name: Server Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build
        run: go build ./...

  client-test:
    name: Client Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: client/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Type check
        run: pnpm check

      - name: Lint
        run: pnpm lint

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [server-build, client-test]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: meza
          POSTGRES_PASSWORD: meza
          POSTGRES_DB: meza
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      scylla:
        image: scylladb/scylla:6.2
        options: >-
          --health-cmd "cqlsh -e 'SELECT now() FROM system.local'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 60s
        ports:
          - 9042:9042
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
    steps:
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "MinIO is ready"
              break
            fi
            sleep 1
          done

      - uses: actions/checkout@v4

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: client/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install client dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: client/e2e
        run: pnpm exec playwright install --with-deps chromium

      - name: Run database migrations
        working-directory: server
        run: go run ./cmd/migrate
        env:
          MEZA_POSTGRES_URL: postgres://meza:meza@localhost:5432/meza?sslmode=disable
          MEZA_SCYLLA_HOSTS: localhost:9042

      - name: Generate Ed25519 dev keys
        run: |
          mkdir -p .keys
          openssl genpkey -algorithm Ed25519 -out .keys/ed25519.pem
          openssl pkey -in .keys/ed25519.pem -pubout -out .keys/ed25519_pub.pem

      - name: Start backend services
        working-directory: server
        run: |
          go build -o /tmp/meza-gateway ./cmd/gateway
          go build -o /tmp/meza-auth ./cmd/auth
          go build -o /tmp/meza-chat ./cmd/chat
          go build -o /tmp/meza-presence ./cmd/presence
          go build -o /tmp/meza-media ./cmd/media
          go build -o /tmp/meza-voice ./cmd/voice
          go build -o /tmp/meza-notification ./cmd/notification
          go build -o /tmp/meza-keys ./cmd/keys
          MEZA_LISTEN_ADDR=:8080 MEZA_CHAT_SERVICE_URL=http://localhost:8082 /tmp/meza-gateway &
          MEZA_LISTEN_ADDR=:8081 /tmp/meza-auth &
          MEZA_LISTEN_ADDR=:8082 /tmp/meza-chat &
          MEZA_LISTEN_ADDR=:8083 /tmp/meza-presence &
          MEZA_LISTEN_ADDR=:8084 MEZA_S3_BUCKET=meza-media MEZA_S3_ACCESS_KEY=minioadmin MEZA_S3_SECRET_KEY=minioadmin /tmp/meza-media &
          MEZA_LISTEN_ADDR=:8085 /tmp/meza-voice &
          MEZA_LISTEN_ADDR=:8086 /tmp/meza-notification &
          MEZA_LISTEN_ADDR=:8088 /tmp/meza-keys &
          sleep 5
        env:
          MEZA_POSTGRES_URL: postgres://meza:meza@localhost:5432/meza?sslmode=disable
          MEZA_SCYLLA_HOSTS: localhost:9042
          MEZA_REDIS_URL: redis://localhost:6379
          MEZA_HMAC_SECRET: e2e-test-secret
          MEZA_NATS_URL: nats://localhost:4222
          MEZA_S3_ENDPOINT: localhost:9000
          MEZA_LIVEKIT_HOST: http://localhost:7880
          MEZA_LIVEKIT_API_KEY: devkey
          MEZA_LIVEKIT_API_SECRET: devsecret
          MEZA_JWT_PRIVATE_KEY_FILE: ${{ github.workspace }}/.keys/ed25519.pem
          MEZA_ED25519_PUBLIC_KEY_FILE: ${{ github.workspace }}/.keys/ed25519_pub.pem

      - name: Start Vite dev server
        working-directory: client
        run: |
          pnpm --filter @meza/web dev &
          sleep 5

      - name: Run E2E tests
        working-directory: client/e2e
        run: pnpm exec playwright test --project=chromium
        env:
          CI: true

      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/e2e/blob-report
          retention-days: 7

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: client/e2e/test-results/
          retention-days: 30
