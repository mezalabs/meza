name: Desktop Release

on:
  push:
    tags: ['desktop-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. desktop-v0.1.0). Defaults to latest desktop-v* tag.'
        required: false

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          package_json_file: client/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Check tag matches package.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#desktop-v}"
          PKG_VERSION=$(node -p "require('./client/packages/desktop/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Type check
        working-directory: client
        run: pnpm check

  build:
    name: Build (${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    env:
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          package_json_file: client/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Build web app
        working-directory: client
        run: pnpm --filter @meza/web build
        env:
          DESKTOP_BUILD: '1'

      - name: Build desktop (main + preload)
        working-directory: client/packages/desktop
        run: pnpm run build

      - name: Copy web build to desktop renderer
        shell: bash
        run: |
          mkdir -p client/packages/desktop/out/renderer
          cp -r client/packages/web/dist/* client/packages/desktop/out/renderer/

      - name: Verify renderer build
        shell: bash
        run: |
          if [ ! -f client/packages/desktop/out/renderer/index.html ]; then
            echo "::error::Web build was not copied to renderer directory"
            exit 1
          fi
          if ! grep -q '<script' client/packages/desktop/out/renderer/index.html; then
            echo "::error::renderer/index.html has no scripts — likely the empty stub, not the web app"
            exit 1
          fi

      - name: Package desktop app
        working-directory: client/packages/desktop
        shell: bash
        run: |
          # Unset empty signing vars so electron-builder doesn't treat "" as a file path
          [ -z "$CSC_LINK" ] && unset CSC_LINK CSC_KEY_PASSWORD && export CSC_IDENTITY_AUTO_DISCOVERY=false
          [ -z "$WIN_CSC_LINK" ] && unset WIN_CSC_LINK WIN_CSC_KEY_PASSWORD
          pnpm exec electron-builder --${{ matrix.platform }} --publish never
        env:
          # macOS code signing
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Windows code signing
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Notarize macOS builds
        if: matrix.platform == 'mac' && env.APPLE_API_KEY != ''
        working-directory: client/packages/desktop
        timeout-minutes: 15
        shell: bash
        run: |
          # Write the API key to the location notarytool expects
          KEY_DIR=~/private_keys
          mkdir -p "$KEY_DIR"
          echo "$APPLE_API_KEY" > "$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"

          VERSION=$(node -p "require('./package.json').version")
          RELEASE_DIR="release/${VERSION}"

          for DMG in "$RELEASE_DIR"/*.dmg; do
            [ -f "$DMG" ] || continue
            echo "Submitting $(basename "$DMG") for notarization..."
            xcrun notarytool submit "$DMG" \
              --key "$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait
            echo "Stapling $(basename "$DMG")..."
            xcrun stapler staple "$DMG"
          done

          rm -rf "$KEY_DIR"

      - name: Cleanup notarization key
        if: always() && matrix.platform == 'mac'
        run: rm -rf ~/private_keys

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            client/packages/desktop/release/**/*.dmg
            client/packages/desktop/release/**/*.zip
            client/packages/desktop/release/**/*.exe
            client/packages/desktop/release/**/*.AppImage
            client/packages/desktop/release/**/*.deb
            client/packages/desktop/release/**/latest*.yml
            client/packages/desktop/release/**/latest*.yaml
            !client/packages/desktop/release/**/*.blockmap
            !client/packages/desktop/release/**/elevate.exe
            !client/packages/desktop/release/**/Meza.exe
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#desktop-v}"

          # Collect release files (exclude debug/internal artifacts)
          mkdir -p release-files
          find artifacts -type f \( \
            -name "*.dmg" -o -name "*.zip" -o -name "*.exe" \
            -o -name "*.AppImage" -o -name "*.deb" \
          \) ! -name "elevate.exe" ! -name "Meza.exe" -exec cp {} release-files/ \;
          # Include auto-update manifests only
          find artifacts -type f \( \
            -name "latest*.yml" -o -name "latest*.yaml" \
          \) -exec cp {} release-files/ \;

          echo "Creating draft release for $TAG"
          ls -lh release-files/

          gh release create "$TAG" release-files/* \
            --title "Desktop v${VERSION}" \
            --draft \
            --generate-notes

  update-packaging:
    name: Update AUR Packaging
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download Linux build artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: artifacts

      - name: Update PKGBUILD and .SRCINFO
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: ${VERSION}"
            exit 1
          fi

          APPIMAGE=$(find artifacts -name "Meza-${VERSION}-linux-x86_64.AppImage" -type f | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "::error::AppImage not found for version ${VERSION} under artifacts/"
            find artifacts -type f -name "*.AppImage" || echo "No AppImage files found"
            exit 1
          fi

          HASH=$(sha256sum "$APPIMAGE" | cut -d' ' -f1)
          echo "Updating AUR packaging to v${VERSION} (sha256: ${HASH})"

          # Update PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" packaging/aur/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${HASH}')/" packaging/aur/PKGBUILD

          # Update .SRCINFO (tab-indented fields)
          sed -i "s/pkgver = .*/pkgver = ${VERSION}/" packaging/aur/.SRCINFO
          sed -i "s/pkgrel = .*/pkgrel = 1/" packaging/aur/.SRCINFO
          sed -i "s|source = .*|source = meza-desktop-bin-${VERSION}.AppImage::https://github.com/mezalabs/meza/releases/download/desktop-v${VERSION}/Meza-${VERSION}-linux-x86_64.AppImage|" packaging/aur/.SRCINFO
          sed -i "s/sha256sums = .*/sha256sums = ${HASH}/" packaging/aur/.SRCINFO

      - name: Commit and push to main
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/aur/PKGBUILD packaging/aur/.SRCINFO

          if git diff --cached --quiet; then
            echo "Packaging already up to date"
          else
            git commit -m "chore(packaging): update AUR PKGBUILD to ${VERSION}"
            git pull --rebase origin main
            git push origin main
          fi
