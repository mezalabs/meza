# Meza Production PostgreSQL Configuration
# Tuned for 64GB RAM, NVMe SSD
# PostgreSQL is allocated ~8GB via Docker mem_limit

listen_addresses = '*'
max_connections = 100

# Memory (conservative within 8GB container limit)
shared_buffers = 2GB
effective_cache_size = 6GB
work_mem = 16MB
maintenance_work_mem = 512MB

# WAL
wal_level = replica
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_completion_target = 0.9

# Planner (NVMe SSD optimized)
random_page_cost = 1.1
effective_io_concurrency = 200
seq_page_cost = 1.0

# Logging
log_min_duration_statement = 500
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
