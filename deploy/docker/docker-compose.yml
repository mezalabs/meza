services:
  # ── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: meza
      POSTGRES_USER: meza
      POSTGRES_PASSWORD: meza
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meza"]
      interval: 5s
      timeout: 5s
      retries: 5

  scylla:
    image: scylladb/scylla:6.2
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        IP=$$(grep -m1 "$$(hostname)" /etc/hosts | awk '{print $$1}')
        exec /usr/bin/scylla \
          --options-file /etc/scylla/scylla.yaml \
          --workdir /var/lib/scylla \
          --smp 1 --memory 750M --overprovisioned \
          --developer-mode 1 \
          --listen-address $$IP \
          --rpc-address $$IP \
          --seed-provider-parameters seeds=$$IP \
          --log-to-stdout 1 --log-to-syslog 0
    healthcheck:
      test: ["CMD-SHELL", "cqlsh $$(grep -m1 $$(hostname) /etc/hosts | awk '{print $$1}') -e 'SELECT now() FROM system.local'"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--http_port", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:4080"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "devkey: devsecret"
    command: --dev --bind 0.0.0.0

  # ── Meza Services ────────────────────────────────────────────

  gateway:
    build:
      context: ../../server
      dockerfile: ../deploy/docker/Dockerfile
      args:
        SERVICE: gateway
    ports:
      - "8080:8080"
    environment:
      MEZA_LISTEN_ADDR: ":8080"
      MEZA_POSTGRES_URL: "postgres://meza:meza@postgres:5432/meza?sslmode=disable"
      MEZA_SCYLLA_HOSTS: "scylla:9042"
      MEZA_REDIS_URL: "redis://redis:6379"
      MEZA_NATS_URL: "nats://nats:4222"
    depends_on:
      postgres:
        condition: service_healthy
      scylla:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  auth:
    build:
      context: ../../server
      dockerfile: ../deploy/docker/Dockerfile
      args:
        SERVICE: auth
    ports:
      - "8081:8081"
    environment:
      MEZA_LISTEN_ADDR: ":8081"
      MEZA_POSTGRES_URL: "postgres://meza:meza@postgres:5432/meza?sslmode=disable"
      MEZA_REDIS_URL: "redis://redis:6379"
      MEZA_NATS_URL: "nats://nats:4222"
      MEZA_HMAC_SECRET: "dev-secret-change-in-production"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  chat:
    build:
      context: ../../server
      dockerfile: ../deploy/docker/Dockerfile
      args:
        SERVICE: chat
    ports:
      - "8082:8082"
    environment:
      MEZA_LISTEN_ADDR: ":8082"
      MEZA_POSTGRES_URL: "postgres://meza:meza@postgres:5432/meza?sslmode=disable"
      MEZA_SCYLLA_HOSTS: "scylla:9042"
      MEZA_REDIS_URL: "redis://redis:6379"
      MEZA_NATS_URL: "nats://nats:4222"
    depends_on:
      postgres:
        condition: service_healthy
      scylla:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  presence:
    build:
      context: ../../server
      dockerfile: ../deploy/docker/Dockerfile
      args:
        SERVICE: presence
    ports:
      - "8083:8083"
    environment:
      MEZA_LISTEN_ADDR: ":8083"
      MEZA_POSTGRES_URL: "postgres://meza:meza@postgres:5432/meza?sslmode=disable"
      MEZA_REDIS_URL: "redis://redis:6379"
      MEZA_NATS_URL: "nats://nats:4222"
      MEZA_JWT_SECRET: "dev-secret-change-in-production"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  media:
    build:
      context: ../../server
      dockerfile: ../deploy/docker/Dockerfile.media
    ports:
      - "8084:8084"
    environment:
      MEZA_LISTEN_ADDR: ":8084"
      MEZA_POSTGRES_URL: "postgres://meza:meza@postgres:5432/meza?sslmode=disable"
      MEZA_REDIS_URL: "redis://redis:6379"
      MEZA_NATS_URL: "nats://nats:4222"
      MEZA_S3_ENDPOINT: "minio:9000"
      MEZA_S3_ACCESS_KEY: "minioadmin"
      MEZA_S3_SECRET_KEY: "minioadmin"
      MEZA_S3_BUCKET: "meza-media"
      MALLOC_ARENA_MAX: "2"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  voice:
    build:
      context: ../../server
      dockerfile: ../deploy/docker/Dockerfile
      args:
        SERVICE: voice
    ports:
      - "8085:8085"
    environment:
      MEZA_LISTEN_ADDR: ":8085"
      MEZA_POSTGRES_URL: "postgres://meza:meza@postgres:5432/meza?sslmode=disable"
      MEZA_REDIS_URL: "redis://redis:6379"
      MEZA_NATS_URL: "nats://nats:4222"
      MEZA_LIVEKIT_HOST: "http://livekit:7880"
      MEZA_LIVEKIT_API_KEY: "devkey"
      MEZA_LIVEKIT_API_SECRET: "devsecret"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  mls:
    build:
      context: ../../server
      dockerfile: ../deploy/docker/Dockerfile
      args:
        SERVICE: mls
    ports:
      - "8087:8087"
    environment:
      MEZA_LISTEN_ADDR: ":8087"
      MEZA_POSTGRES_URL: "postgres://meza:meza@postgres:5432/meza?sslmode=disable"
      MEZA_NATS_URL: "nats://nats:4222"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

volumes:
  postgres_data:
  scylla_data:
  redis_data:
  minio_data:
