}

message ListFriendRequestsRequest {}

message ListFriendRequestsResponse {
  repeated FriendRequestEntry incoming = 1;
  repeated FriendRequestEntry outgoing = 2;
}

// Search

message SearchMessagesRequest {
  reserved 1;              // was query, removed 2026-02-28
  reserved "query";
  optional string server_id = 2;
  optional string channel_id = 3;
  optional string author_id = 4;
  optional bool has_attachment = 5;
  int32 limit = 6;
  optional string before_id = 7;
  optional string mentioned_user_id = 8;
  optional string after_id = 9;
  repeated MessageType message_types = 10; // filter by message type (empty = all)
}

message SearchMessagesResponse {
  repeated Message messages = 1;
  reserved 2;              // was total_hits, removed 2026-02-28
  reserved "total_hits";
  bool has_more = 3;
}

// Server update event — broadcast when server metadata (name, icon, etc.) changes.
message ServerUpdateEvent {
  Server server = 1;
}

// User update event — broadcast when a user's public profile changes.
message UserUpdateEvent {
  PublicUser user = 1;
}

// Internal NATS job message for embed URL fetching.
message EmbedFetchJob {
  string channel_id = 1;
  string message_id = 2;
  repeated string urls = 3;
}

// Internal NATS event published by the keys service after a channel key rotation.
// The chat service subscribes and creates a system message in the channel.
message KeyRotationInternalEvent {
  string channel_id = 1;
  string actor_id = 2;
  uint32 new_key_version = 3;
}

