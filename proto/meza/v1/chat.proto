}

// Permission Overrides

message SetPermissionOverrideRequest {
  string target_id = 1;  // channel_group_id or channel_id
  string role_id = 2;    // set for role overrides (mutually exclusive with user_id)
  int64 allow = 3;
  int64 deny = 4;
  string user_id = 5;    // set for user overrides (mutually exclusive with role_id)
}

message SetPermissionOverrideResponse {
  PermissionOverride permission_override = 1;
}

message DeletePermissionOverrideRequest {
  string target_id = 1;  // channel_group_id or channel_id
  string role_id = 2;    // set for role overrides (mutually exclusive with user_id)
  string user_id = 3;    // set for user overrides (mutually exclusive with role_id)
}

message DeletePermissionOverrideResponse {}

message ListPermissionOverridesRequest {
  string target_id = 1;  // channel_group_id or channel_id
}

message ListPermissionOverridesResponse {
  repeated PermissionOverride permission_overrides = 1;
}

// Effective Permissions

message GetEffectivePermissionsRequest {
  string server_id = 1;
  string channel_id = 2; // optional — omit for server-level
  string user_id = 3;    // optional — defaults to caller
  bool include_sources = 4; // when true, populate sources in response
}

message GetEffectivePermissionsResponse {
  int64 permissions = 1;
  repeated PermissionSource sources = 2; // populated when include_sources=true
}

enum PermissionSourceType {
  PERMISSION_SOURCE_TYPE_UNSPECIFIED = 0;
  PERMISSION_SOURCE_TYPE_BASE_ROLE = 1;
  PERMISSION_SOURCE_TYPE_ROLE_OVERRIDE = 2;
  PERMISSION_SOURCE_TYPE_CATEGORY_OVERRIDE = 3;
  PERMISSION_SOURCE_TYPE_CHANNEL_OVERRIDE = 4;
  PERMISSION_SOURCE_TYPE_USER_OVERRIDE = 5;
  PERMISSION_SOURCE_TYPE_ADMINISTRATOR = 6;
  PERMISSION_SOURCE_TYPE_OWNER = 7;
}

message PermissionSource {
  int64 permission = 1;
  bool granted = 2;
  PermissionSourceType source_type = 3;
  string source_name = 4; // e.g. role name, "Category: General"
}

// Permission Events

message PermissionOverrideUpdateEvent {
  PermissionOverride override = 1;
  string server_id = 2;
}

message PermissionOverrideDeleteEvent {
  string override_id = 1;
  string target_id = 2;  // channel_id or channel_group_id
  string server_id = 3;
}

message PermissionsUpdatedEvent {
  string server_id = 1;
  string channel_id = 2; // optional — empty means server-level change
}

// Server Creation from Template

message ChannelSpec {
  string name = 1;
  ChannelType type = 2;
  bool is_default = 3;
  bool is_private = 4;
  repeated string role_names = 5; // roles that get access to this private channel (matched by name against RoleSpec)
}

message RoleSpec {
  string name = 1;
  int64 permissions = 2;
  int32 color = 3;
  bool is_self_assignable = 4;
}

message CreateServerFromTemplateRequest {
  string name = 1;
  optional string icon_url = 2;
  repeated ChannelSpec channels = 3;
  repeated RoleSpec roles = 4;
  optional string welcome_message = 5;
  optional string rules = 6;
  bool onboarding_enabled = 7;
  bool rules_required = 8;
}

message CreateServerFromTemplateResponse {
  Server server = 1;
  repeated Channel channels = 2;
  repeated Role roles = 3;
  Invite invite = 4;
}

