syntax = "proto3";
package meza.v1;

import "meza/v1/models.proto";
import "google/protobuf/timestamp.proto";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc GetSalt(GetSaltRequest) returns (GetSaltResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse);
  rpc RevokeDevice(RevokeDeviceRequest) returns (RevokeDeviceResponse);
  rpc RevokeAllOtherDevices(RevokeAllOtherDevicesRequest) returns (RevokeAllOtherDevicesResponse);
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc GetKeyBundle(GetKeyBundleRequest) returns (GetKeyBundleResponse);
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  // Account recovery via BIP39 recovery phrase
  rpc GetRecoveryBundle(GetRecoveryBundleRequest) returns (GetRecoveryBundleResponse);
  rpc RecoverAccount(RecoverAccountRequest) returns (RecoverAccountResponse);
  // Device recovery via another logged-in device
  rpc VerifyRecoveryEmail(VerifyRecoveryEmailRequest) returns (VerifyRecoveryEmailResponse);
  rpc InitiateDeviceRecovery(InitiateDeviceRecoveryRequest) returns (InitiateDeviceRecoveryResponse);
  rpc PollDeviceRecovery(PollDeviceRecoveryRequest) returns (PollDeviceRecoveryResponse);
  rpc ApproveDeviceRecovery(ApproveDeviceRecoveryRequest) returns (ApproveDeviceRecoveryResponse);
  rpc CompleteDeviceRecovery(CompleteDeviceRecoveryRequest) returns (CompleteDeviceRecoveryResponse);
  rpc GetPendingRecoveryRequest(GetPendingRecoveryRequestRequest) returns (GetPendingRecoveryRequestResponse);
}

message RegisterRequest {
  string email = 1;
  bytes auth_key = 2;
  bytes salt = 3;
  bytes encrypted_key_bundle = 4;
  bytes key_bundle_iv = 5;
  string username = 6;
  // Field 7 reserved (was initial_key_packages)
  reserved 7;
  // Recovery bundle: key bundle encrypted with recovery key derived from BIP39 phrase
  bytes recovery_encrypted_key_bundle = 8;
  bytes recovery_key_bundle_iv = 9;
  // HKDF-derived verifier proving knowledge of recovery phrase (server stores SHA-256 hash)
  bytes recovery_verifier = 10;
}

message RegisterResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message LoginRequest {
  string identifier = 1;  // email or username
  bytes auth_key = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
  bytes encrypted_key_bundle = 4;
  bytes key_bundle_iv = 5;
  bytes salt = 6;
}

message LogoutRequest {}

message LogoutResponse {}

message GetSaltRequest {
  string identifier = 1;  // email or username
}

message GetSaltResponse {
  bytes salt = 1;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message RegisterDeviceRequest {
  bytes device_public_key = 1;
  bytes device_signature = 2;
  string device_name = 3;
  // Push notification fields
  string platform = 4;               // "web", "android", "ios", "electron"
  optional string push_endpoint = 5;  // Web Push subscription endpoint URL
  optional string push_p256dh = 6;    // Web Push ECDH public key
  optional string push_auth = 7;      // Web Push auth secret
  optional string push_token = 8;     // FCM/APNs device token
}

message RegisterDeviceResponse {
  string device_id = 1;
}

message RevokeDeviceRequest {
  string device_id = 1;
}

message RevokeDeviceResponse {}

message RevokeAllOtherDevicesRequest {}

message RevokeAllOtherDevicesResponse {
  int32 revoked_count = 1;
}

message ListDevicesRequest {}

message ListDevicesResponse {
  repeated Device devices = 1;
}

message Device {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp last_seen_at = 4;
  bool is_current = 5;
  string platform = 6;
  bool push_enabled = 7;
}

message UpdateProfileRequest {
  optional string display_name = 1;
  optional string avatar_url = 2;
  optional float emoji_scale = 3;
  optional string bio = 4;
  optional string pronouns = 5;
  optional string banner_url = 6;
  optional string theme_color_primary = 7;
  optional string theme_color_secondary = 8;
  optional bool simple_mode = 9;
  optional AudioPreferences audio_preferences = 10;
  optional string dm_privacy = 11;  // "anyone", "message_requests", "mutual_servers", "nobody"
  repeated UserConnection connections = 12;
  bool clear_connections = 13;  // when true, replace all connections (empty list = clear)
  optional string friend_request_privacy = 14;  // "everyone", "server_co_members", "nobody"
  optional string profile_privacy = 15;          // "everyone", "server_co_members", "friends", "nobody"
}

message UpdateProfileResponse {
  User user = 1;
}

message ChangePasswordRequest {
  bytes old_auth_key = 1;
  bytes new_auth_key = 2;
  bytes new_salt = 3;
  bytes new_encrypted_key_bundle = 4;
  bytes new_key_bundle_iv = 5;
  bytes new_recovery_encrypted_key_bundle = 6;
  bytes new_recovery_key_bundle_iv = 7;
  // Updated recovery verifier for the new recovery phrase
  bytes new_recovery_verifier = 8;
}

message ChangePasswordResponse {}

message GetKeyBundleRequest {}

message GetKeyBundleResponse {
  bytes encrypted_key_bundle = 1;
  bytes key_bundle_iv = 2;
}

message GetProfileRequest {
  string user_id = 1;
}

message GetProfileResponse {
  User user = 1;
}

// Account Recovery

message GetRecoveryBundleRequest {
  string email = 1;
}

message GetRecoveryBundleResponse {
  bytes recovery_encrypted_key_bundle = 1;
  bytes recovery_key_bundle_iv = 2;
  bytes salt = 3;
}

message RecoverAccountRequest {
  string email = 1;
  bytes new_auth_key = 2;
  bytes new_salt = 3;
  bytes new_encrypted_key_bundle = 4;
  bytes new_key_bundle_iv = 5;
  bytes new_recovery_encrypted_key_bundle = 6;
  bytes new_recovery_key_bundle_iv = 7;
  // Proof of recovery phrase knowledge: HKDF-derived verifier from the OLD recovery key
  bytes recovery_verifier = 8;
  // Updated verifier for the NEW recovery phrase
  bytes new_recovery_verifier = 9;
}

message RecoverAccountResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

// Device Recovery — recover account via another logged-in device

message VerifyRecoveryEmailRequest {
  string email = 1;
  string code = 2;  // empty for send mode, 6-digit OTP for verify mode
}

message VerifyRecoveryEmailResponse {
  string status = 1;  // "otp_sent" or "verified"
  string otp_session_token = 2;  // only set when status="verified"
}

message InitiateDeviceRecoveryRequest {
  string otp_session_token = 1;
  bytes ephemeral_public_key = 2;  // 32 bytes X25519
}

message InitiateDeviceRecoveryResponse {
  string session_id = 1;
}

message PollDeviceRecoveryRequest {
  string session_id = 1;
}

message PollDeviceRecoveryResponse {
  string status = 1;  // "pending", "approved", "completed", "expired"
  bytes wrapped_bundle = 2;  // 124 bytes ECIES envelope (only when status="approved")
}

message ApproveDeviceRecoveryRequest {
  string session_id = 1;
  bytes wrapped_bundle = 2;  // 124 bytes: ephemeral_pub(32) + nonce(12) + ciphertext(80)
}

message ApproveDeviceRecoveryResponse {}

message CompleteDeviceRecoveryRequest {
  string session_id = 1;
  bytes new_auth_key = 2;
  bytes new_salt = 3;
  bytes new_encrypted_key_bundle = 4;
  bytes new_key_bundle_iv = 5;
  bytes new_recovery_encrypted_key_bundle = 6;
  bytes new_recovery_key_bundle_iv = 7;
  bytes new_recovery_verifier = 8;
  string platform = 9; // "web", "android", "ios", "electron" — defaults to "web"
}

message CompleteDeviceRecoveryResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message GetPendingRecoveryRequestRequest {}

message GetPendingRecoveryRequestResponse {
  string session_id = 1;  // empty if no pending request
  bytes ephemeral_public_key = 2;  // 32 bytes X25519
}
