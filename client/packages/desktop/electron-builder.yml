appId: com.meza.desktop
productName: Meza
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
asar: true
# uiohook-napi ships a prebuilt .node binary; it must live outside app.asar
# so the OS loader can mmap it. On macOS the unpacked binary is signed by
# electron-builder alongside the app bundle.
asarUnpack:
  - "**/node_modules/uiohook-napi/**"
compression: normal

directories:
  output: release/${version}
  buildResources: build

files:
  - out/**/*

extraResources:
  - from: build/icon.png
    to: icon.png
  - from: build/trayTemplate.png
    to: trayTemplate.png
  - from: build/trayTemplate@2x.png
    to: trayTemplate@2x.png

# macOS
mac:
  category: public.app-category.social-networking
  darkModeSupport: true
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false

dmg:
  sign: false

# Windows
win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Meza

# Linux
linux:
  executableName: meza
  category: Network
  desktop:
    entry: build/linux/meza.desktop
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libsecret-1-0

# Deep link protocol
protocols:
  - name: Meza
    schemes:
      - meza

# Auto-update (checked at runtime by electron-updater)
publish:
  provider: github
